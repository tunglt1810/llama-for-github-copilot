# LiteLLM proxy configuration
# Bridges Claude Code (Anthropic Messages API) → llama-server (OpenAI API)
#
# Usage:
#   litellm --config config/litellm.yaml --host 127.0.0.1 --port 4000
#
# Claude Code setup:
#   export ANTHROPIC_BASE_URL=http://127.0.0.1:4000
#   export ANTHROPIC_API_KEY=local-key

model_list:
  # ── Primary alias used by env vars in .env.example ────────────────────────
  - model_name: local-llm
    litellm_params:
      model: openai/qwen3.5-9b-reasoning
      api_base: http://127.0.0.1:18888/v1
      api_key: 'local'

  # ── Claude model name fallbacks (Claude Code may hardcode these) ──────────
  - model_name: claude-opus-4-6
    litellm_params:
      model: openai/qwen3.5-9b-reasoning
      api_base: http://127.0.0.1:18888/v1
      api_key: 'local'

  - model_name: claude-opus-4-5
    litellm_params:
      model: openai/qwen3.5-9b-reasoning
      api_base: http://127.0.0.1:18888/v1
      api_key: 'local'

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: openai/qwen3.5-9b-reasoning
      api_base: http://127.0.0.1:18888/v1
      api_key: 'local'

  - model_name: claude-haiku-3-5
    litellm_params:
      model: openai/qwen3.5-9b-reasoning
      api_base: http://127.0.0.1:18888/v1
      api_key: 'local'

general_settings:
  master_key: 'local-key' # matches ANTHROPIC_API_KEY in .env.example
  enable_jwt_auth: false
  store_model_in_db: false # stateless, no DB needed

litellm_settings:
  # Surface the <think> ... </think> reasoning tokens in the response
  drop_params: false
  request_timeout: 600 # long timeout for deep reasoning traces
