# Proxy configuration for the Go-based Ollama-compatible proxy.
# You can edit values here and override them with environment variables.

host: 127.0.0.1
port: 11434
run_mode: llama-server-wrapper
ollama_version: '0.20.7' # Ollama version that the proxy reports via /api/version
upstream_base: ''
model_name: ''
model_size: 0
llama_server_args:
  host: 127.0.0.1
  port: 50000
  n-gpu-layers: '99'
  ctx-per-slot: 262144 # Parameter representing the context window of one processing slot; on start the server computes ctx-size = ctx-per-slot * parallel.
  parallel: 4
  cache-type-k: 'q4_0'
  cache-type-v: 'q4_0'
  flash-attn: 'auto'
  embedding: 'true'
